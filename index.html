<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Tycoon Mafia — a multiplayer social deduction party game. Play with friends in real time." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Tycoon Mafia" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="LOGO.png" />
  <title>Tycoon Mafia — Multiplayer Party Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Arial Black', Arial, sans-serif;
    }

    .register {
      width: 100%;
      max-width: 400px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
    }

    .reg-logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(200,0,0,0.5));
      margin-bottom: 12px;
    }

    .reg-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #cc1111;
      text-shadow: 0 0 16px rgba(200,0,0,0.5);
      margin-bottom: 4px;
    }

    .reg-sub {
      font-size: 11px;
      letter-spacing: 3px;
      color: #660000;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .reg-desc {
      font-size: 11px;
      color: #5a0000;
      font-family: Arial, sans-serif;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid #5a0000;
      border-radius: 8px;
      padding: 14px 16px 14px 44px;
      color: #fff;
      font-size: 14px;
      font-family: Arial, sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap input::placeholder { color: #5a0000; }

    .input-wrap input:focus {
      border-color: #cc1111;
      box-shadow: 0 0 12px rgba(200,0,0,0.25);
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: #660000;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .btn-join {
      margin-top: 8px;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #8b0000, #cc1111);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 4px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(200,0,0,0.4);
      transition: box-shadow 0.2s, transform 0.1s;
      font-family: 'Arial Black', Arial, sans-serif;
    }

    .btn-join:hover {
      box-shadow: 0 0 30px rgba(200,0,0,0.7);
      transform: translateY(-1px);
    }

    .btn-join:active { transform: translateY(0); }

    .reg-error {
      color: #ff4444;
      font-size: 11px;
      letter-spacing: 1px;
      margin-top: 12px;
      display: none;
      font-family: Arial, sans-serif;
    }

    .reg-footer {
      font-size: 10px;
      color: #3d0000;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<div class="register">
  <img src="LOGO.png" alt="Tycoon Mafia Logo" class="reg-logo" />
  <div class="reg-title">TYCOON MAFIA</div>
  <div class="reg-sub">MULTIPLAYER PARTY GAME</div>
  <p class="reg-desc">A real-time social deduction game.<br>Enter a nickname to join your crew.</p>

  <div class="form">
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20 Q4 14 12 14 Q20 14 20 20"/></svg>
      <input type="text" id="usernameInput" placeholder="Enter your nickname" autocomplete="off" />
    </div>
    <button class="btn-join" onclick="joinGame()">JOIN GAME</button>
  </div>

  <p class="reg-error" id="reg-error"></p>
  <p class="reg-footer">For entertainment purposes only</p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }

  const socket = io();

  document.getElementById('usernameInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') joinGame();
  });

  function joinGame() {
    const username = document.getElementById('usernameInput').value.trim();
    if (!username) return;
    socket.emit('register', { name: username });
  }

  socket.on('register_error', (msg) => {
    const err = document.getElementById('reg-error');
    err.textContent = msg;
    err.style.display = 'block';
  });

  socket.on('registered', ({ status, player }) => {
    const username = document.getElementById('usernameInput').value.trim();
    sessionStorage.setItem('tmUser', username);
    sessionStorage.setItem('tmPhoto', player ? (player.photo || '') : '');
    window.location.href = 'main.html';
  });
</script>

</body>
</html>
